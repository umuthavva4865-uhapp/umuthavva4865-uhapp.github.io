<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Umut & Havva ❤️</title>

<style>
body{
margin:0;
background:linear-gradient(#0b0b1f,#1b1035);
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

.kutu{
animation:gel 2s;
padding:20px;
}

h1{
color:#ff4d6d;
font-size:40px;
}

p{
font-size:22px;
margin:15px;
}

@keyframes gel{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}
</style>

</head>

<body>

<div class="kutu">
<h1>❤️ Umut & Havva ❤️</h1>

<p>Mesafeler değil,<br>kalpler önemlidir. ❤️</p>

<p>Uzakta olsan da<br>kalbimdesin. ❤️</p>

<p>Seni çok seviyorum Havva... 🌹</p>

</div>

</body>
</html>
